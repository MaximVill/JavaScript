<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лаб. 8 — Задание 3</title>
  <link rel="stylesheet" href="css/task2.css">
</head>
<body>
  <h1>Таблица сотрудников</h1>
  <p class="subtitle">Лабораторная работа 8 — Задание 3</p>

  <div class="controls" id="controls">
    <button class="btn-primary" onclick="loadData()">Загрузить</button>
    <button class="btn-outline" onclick="openAddModal()">+ Добавить</button>
    <button class="btn-danger" id="btn-delete-sel" onclick="deleteSelected()" style="display:none">Удалить выбранных</button>
    <div class="spacer"></div>
    <div class="filter-group">
      <button class="active" onclick="setFilter('all', this)">Все</button>
      <button onclick="setFilter('М', this)">Мужчины</button>
      <button onclick="setFilter('Ж', this)">Женщины</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#86efac"></div>&lt;18</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fde047"></div>18–60</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fca5a5"></div>&gt;60</div>
    </div>
  </div>

  <div class="table-wrap" id="table-wrap">
    <div class="empty-state"><p>Нажмите «Загрузить» для заполнения таблицы</p></div>
  </div>

  <div class="statusbar" id="statusbar"></div>

  <div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
    <div class="modal">
      <h2 id="modal-title">Добавить запись</h2>
      <div class="form-grid">
        <div class="form-group"><label>Имя</label><input id="f-name" placeholder="Иван"></div>
        <div class="form-group"><label>Фамилия</label><input id="f-surname" placeholder="Иванов"></div>
        <div class="form-group"><label>Возраст</label><input id="f-age" type="number" min="1" max="120"></div>
        <div class="form-group"><label>Пол</label>
          <select id="f-gender"><option value="М">Мужской</option><option value="Ж">Женский</option></select>
        </div>
        <div class="form-group full"><label>Адрес</label><input id="f-address" placeholder="г. Москва, ул. Примерная, д. 1"></div>
        <div class="form-group full"><label>Телефон</label><input id="f-phone" placeholder="+7 (900) 000-00-00"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeModal()">Отмена</button>
        <button class="btn-primary" onclick="saveModal()">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="js/task2.js"></script>
</body>
</html>
