<!-- Создайте функцию, которая удаляет всё содержимое из elem. -->

<html>
  <ol id="list">
    <li>Привет</li>
    <li>Миp</li>
  </ol>

  <button id="clear-btn">Удалить всё содержимое</button>

  <script>
    function clear(elem) {
      elem.innerHTML = ''
    }

    const list = document.getElementById('list')
    const btn = document.getElementById('clear-btn')

    btn.addEventListener('click', () => {
      clear(list)
    })
  </script>
</html>
