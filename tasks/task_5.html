<!-- При помощи javascript выделите красным цветом ячейки с четной суммой i и j в таблице -->
 
<html>
  <table id="table" border="1" cellpadding="5">
    <tr><td>1:1</td><td>1:2</td><td>1:3</td><td>1:4</td></tr>
    <tr><td>2:1</td><td>2:2</td><td>2:3</td><td>2:4</td></tr>
    <tr><td>3:1</td><td>3:2</td><td>3:3</td><td>3:4</td></tr>
    <tr><td>4:1</td><td>4:2</td><td>4:3</td><td>4:4</td></tr>
    <tr><td>5:1</td><td>5:2</td><td>5:3</td><td>5:4</td></tr>
    <tr><td>6:1</td><td>6:2</td><td>6:3</td><td>6:4</td></tr>
  </table>

  <script>
    const table = document.getElementById('table')
    const rows = table.rows

    for (let i = 0; i < rows.length; i++) {
      const cells = rows[i].cells
      for (let j = 0; j < cells.length; j++) {
        if ((i + j) % 2 === 0) {
          cells[j].style.backgroundColor = 'red'
        }
      }
    }
  </script>
</html>
