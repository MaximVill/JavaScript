<h3>Горизонтальные линии</h3>
<p>
	Выберите значения параметров, которые требуется изменить, и нажмите кнопку
	<b>Выполнить</b>.
</p>

<br/><br/>

<hr id="line" align="center" size="25" width="270" color="teal"/>

<br/><br/><br/><br/>

<table border="1" cellpadding="10" cellspacing="0">

	<tr>
		<td valign="top" width="250">
			Выравнивание<br /><br />
			<input type="radio" name="align" value="left"/>LEFT<br/>
			<input type="radio" name="align" value="center" checked />
			CENTER<br/>
			<input type="radio" name="align" value="right"/>RIGHT<br/><br/>
			<input type="text" id="size" value="25" size="5"/>толщина линии
			(size)<br/><br/>
			<input type="text" id="width" value="270" size="5"/>длина линии
			(width)<br />
		</td>

		<td valign="top" width="150">
			Цвет линии (color)<br/><br/>
			<select id="color" size="10">
				<option value="teal" selected>teal</option>
				<option value="green">green</option>
				<option value="olive">olive</option>
				<option value="navy">navy</option>
				<option value="purple">purple</option>
				<option value="gray">gray</option>
				<option value="silver">silver</option>
				<option value="yellow">yellow</option>
				<option value="blue">blue</option>
				<option value="fuchsia">fuchsia</option>
				<option value="white">white</option>
				<option value="black">black</option>
				<option value="red">red</option>
				<option value="lime">lime</option>
				<option value="aqua">aqua</option>
			</select>
		</td>
	</tr>
</table>

<br/>

<button onclick="apply()">Выполнить</button>
		<button onclick="location.reload()">Обновить</button>

<script>
	function apply() {
		var line = document.getElementById('line')
		line.size = document.getElementById('size').value
		line.width = document.getElementById('width').value
		line.color = document.getElementById('color').valu
		var radios = document.getElementsByName('align')
		for (var i = 0; i < radios.length; i++) {
			if (radios[i].checked) {
				line.align = radios[i].value
				break
			}
		}
	}
</script>
